<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reminders</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>My Reminders</h1>
        <a href="{{ url_for('auth.logout') }}" class="exit-btn">⊗ Exit</a>
        
        {% if reminders %}
        <div class="reminders-list">
        {% for r in reminders %}
            <div class="reminder-card">
                <div class="reminder-header">
                    <span class="reminder-title">{{ r[2] }}</span>
                    <span class="reminder-status {{ 'sent' if r[6] == 1 else 'pending' }}">
                        {{ '✓ Sent' if r[6] == 1 else '! Pending' }}
                    </span>
                </div>
                <div class="reminder-detail">📝 {{ r[3] }}</div>
                <div class="reminder-detail">🕐 {{ r[4] }}</div>
                <div class="reminder-detail">🔁 {{ r[5] | capitalize }}</div>
                <form action="{{ url_for('reminders.delete_reminder', reminder_id=r[0]) }}" method="post">
                    <button type="submit" class="delete-btn">Delete</button>
                </form>
            </div>
        {% endfor %}
        </div>
        {% else %}
            <p>No reminders found for this email.</p>
        {% endif %}

        <a href="{{ url_for('reminders.set_reminder') }}" class="back-button">← 🏠 Home</a>
    </div>
</body>
</html>
