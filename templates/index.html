<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a ScanRemind Reminder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>Create a ScanRemind Reminder</h1>
        {% if session.get('verified_email') %}
            <a href="{{ url_for('reminders.my_reminders') }}" class="manage-link">My Reminders</a>
        {% else %}
            <a href="{{ url_for('auth.manage_reminders') }}" class="manage-link">Manage Reminders</a>
        {% endif %}
        
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-messages">
            {% for category, message in messages %}
                <div class="flash {{ category }}" style="color: blue; font-weight: bold; margin: 10px 0;">
                {{ message }}
                </div>
            {% endfor %}
            </div>
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('reminders.create_reminder') }}" method="post">
            <label for="username">Your name:</label>
            <input type="text" id="username" name="username" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="title">What should we remind you about?</label>
            <input type="text" id="title" name="title" required>

            <label for="description">Reminder Description:</label>
            <textarea id="description" name="description" required></textarea>

            <label for="reminder_date">Date of Reminder:</label>
            <input type="date" id="reminder_date" name="reminder_date" required>

            <label for="reminder_time">Time of Reminder:</label>
            <input type="time" id="reminder_time" name="reminder_time" required>
            <input type="hidden" id="timezone" name="timezone" value="">

            <label>Repeat:</label>
            <div class="radio-group">
                <label><input type="radio" name="repeat" value="none" checked> One time</label>
                <label><input type="radio" name="repeat" value="daily"> Daily</label>
                <label><input type="radio" name="repeat" value="weekly"> Weekly</label>
                <label><input type="radio" name="repeat" value="monthly"> Monthly</label>
            </div>
            <button type="submit">Schedule Reminder</button>
        </form>

        
    </div>
    <script>
        document.getElementById('timezone').value = Intl.DateTimeFormat().resolvedOptions().timeZone;
    </script>
</body>
</html>
